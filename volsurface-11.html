<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volatility Surface</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.1/plotly.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#101114;overflow:hidden;
  font-family:'Inter','Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;}

#wrap{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;}

/* Header — top-left */
#vheader {
  position:absolute;top:16px;left:24px;z-index:100;
  display:flex;align-items:center;gap:10px;
  pointer-events:none;
}
.vtitle { font-size:15px;font-weight:700;color:#eaeaec;letter-spacing:0.3px; }
.vq { 
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:50%;
  background:#26262a;color:#7a7a85;font-size:11px;font-weight:700;border:1px solid #333338;
}
.vsub { font-size:14px;color:#555560;font-weight:500; }

#spotbox {
  position:absolute;top:56px;left:24px;z-index:100;
  background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.05);
  padding:5px 10px;border-radius:4px;
  font-size:12px;font-weight:600;color:#00e6e6;
  letter-spacing:0.5px;
  pointer-events:none;
}

/* Asset switcher — top-right */
#asel{position:absolute;top:16px;right:25px;z-index:100;
  display:flex;align-items:center;gap:6px; opacity:0;} /* hiding as backquant doesn't show */
.ab{padding:4px 13px;font-size:10px;font-weight:600;letter-spacing:.5px;
  cursor:pointer;border:1px solid #222;background:transparent;color:#444;
  border-radius:3px;transition:all .12s;user-select:none;}
.ab:hover{color:#777;border-color:#444;}
.ab.btc{color:#FF9900;border-color:#FF9900;background:rgba(255,153,0,.07);}
.ab.eth{color:#00B7EB;border-color:#00B7EB;background:rgba(0,183,235,.07);}

/* Status — bottom-right */
#sr{position:absolute;bottom:14px;right:18px;z-index:100;
  display:flex;align-items:center;gap:7px; opacity:0;} /* hidden to match screenshot strictly */
#st{font-size:10px;color:#333;letter-spacing:.3px;font-weight:600;}
#st.ok{color:#3fb950;}#st.er{color:#f44;}
#cd{font-size:9px;color:#333340;font-variant-numeric:tabular-nums;font-weight:600;}

#plot{flex:1;min-height:0;width:100%;}

/* Loading */
#ld{position:absolute;inset:0;background:#101114;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;gap:16px;}
#ldsym{font-size:30px;font-weight:700;letter-spacing:3px;}
#ldbarw{width:200px;height:2px;background:#222;border-radius:1px;overflow:hidden;}
#ldbar{height:100%;width:5%;border-radius:1px;transition:width .4s;}
#ldtxt{font-size:9.5px;color:#555;letter-spacing:1px;font-weight:600;}
</style>
</head>
<body>

<div id="wrap">
  <div id="vheader">
    <span class="vtitle">Volatility Surface</span>
    <span class="vq">?</span>
    <span class="vsub">3D IV Surface</span>
  </div>
  <div id="spotbox">Spot: <span id="spotval"></span></div>

  <div id="asel">
    <div class="ab btc" id="bb" onclick="go('btc')">BTC</div>
    <div class="ab"     id="be" onclick="go('eth')">ETH</div>
  </div>

  <div id="sr">
    <span id="st">LOADING</span>
    <span id="cd"></span>
  </div>

  <div id="ld">
    <div id="ldsym" style="color:#FF9900">BTC</div>
    <div id="ldbarw"><div id="ldbar" style="background:#FF9900"></div></div>
    <div id="ldtxt">FETCHING OPTIONS DATA…</div>
  </div>

  <div id="plot"></div>
</div>

<script>
const C={};
let CUR='btc',TM=null,TR=1800; // 30 minutes update limit!

async function deribit(cur){
  const u=s=>fetch(s,{signal:AbortSignal.timeout(12000)}).then(r=>r.json());
  const [bk,ix]=await Promise.all([
    u(`https://www.deribit.com/api/v2/public/get_book_summary_by_currency?currency=${cur}&kind=option`),
    u(`https://www.deribit.com/api/v2/public/get_index_price?index_name=${cur.toLowerCase()}_usd`)
  ]);
  const spot=ix.result?.index_price||0;
  const now=Date.now();
  const pts=[];
  (bk.result||[]).forEach(b=>{
    if(!b.instrument_name||!(b.mark_iv>0&&b.mark_iv<600))return;
    const p=b.instrument_name.split('-');
    if(p.length<4)return;
    const K=parseFloat(p[2]);
    const exp=new Date(p[1].replace(/(\d+)([A-Z]+)(\d+)/,'$1 $2 20$3')+' 08:00 UTC');
    const dte=Math.round((exp-now)/86400000);
    if(dte<1||dte>180)return;
    if(spot>0&&(K<spot*0.50||K>spot*1.55))return;
    pts.push({K,dte,iv:b.mark_iv});
  });
  return{spot,pts};
}

async function sabr(sym){
  const b=sym.toUpperCase()+'USDT';
  const g=async u=>{
    try{const r=await fetch(u,{signal:AbortSignal.timeout(8000)});if(r.ok)return r.json();}catch(e){}
    return fetch('https://corsproxy.io/?url='+encodeURIComponent(u),{signal:AbortSignal.timeout(10000)}).then(r=>r.json());
  };
  const[tk,kl]=await Promise.all([
    g(`https://api.binance.com/api/v3/ticker/24hr?symbol=${b}`),
    g(`https://api.binance.com/api/v3/klines?symbol=${b}&interval=1h&limit=720`)
  ]);
  const cl=kl.map(k=>parseFloat(k[4]));
  const spot=cl[cl.length-1];
  const ret=cl.slice(-168).map((v,i,a)=>i>0?Math.log(v/a[i-1]):0).slice(1);
  const hv=Math.sqrt(ret.reduce((s,r)=>s+r*r,0)/ret.length)*Math.sqrt(8760);
  const al=Math.max(0.3,hv),be=0.7,ro=sym==='btc'?-0.15:-0.20,nu=0.35;
  const DT=[1,3,5,7,10,14,21,30,45,60,90,120];
  const NK=25;
  const pts=[];
  DT.forEach(dte=>{
    const tau=dte/365;
    for(let i=0;i<NK;i++){
      const pct=-0.40+i*0.80/(NK-1);
      const K=spot*(1+pct),F=spot;
      let iv;
      if(Math.abs(pct)<1e-4){
        iv=al/Math.pow(F,1-be)*100;
      } else {
        const z=(nu/al)*Math.pow(F*K,(1-be)/2)*Math.log(F/K);
        const chi=Math.abs(z)<1e-8?1:Math.log((Math.sqrt(1-2*ro*z+z*z)+z-ro)/(1-ro))/z;
        const t1=al/(Math.pow(F*K,(1-be)/2)*(1+((1-be)*Math.log(F/K))**2/24+((1-be)*Math.log(F/K))**4/1920));
        const t2=1+((1-be)**2/24*al**2/Math.pow(F*K,1-be)+ro*be*nu*al/(4*Math.pow(F*K,(1-be)/2))+nu**2*(2-3*ro**2)/24)*tau;
        iv=Math.max(5,t1*(z/chi)*t2*100);
      }
      if(dte<=5) iv*=(1+0.4*Math.exp(-Math.pow(pct/0.08,2)));
      if(dte<=10&&Math.abs(pct)>0.2) iv*=1.15;
      pts.push({K,dte,iv});
    }
  });
  return{spot,pts,fb:true,px:parseFloat(tk.lastPrice)};
}

async function load(sym){
  const col=sym==='btc'?'#FF9900':'#00B7EB',nm=sym==='btc'?'BTC':'ETH';
  ld(true,nm,col);
  try{
    let d;
    try{
      ltxt('CONNECTING TO DERIBIT…',30);
      d=await deribit(sym==='btc'?'BTC':'ETH');
      if(!d.pts||d.pts.length<20)throw 0;
      ltxt(`PROCESSING ${d.pts.length} OPTIONS…`,70);
    }catch(e){
      ltxt('SABR MODEL — BINANCE DATA…',55);
      d=await sabr(sym);
    }
    ltxt('RENDERING…',90);
    C[sym]=d;
    await new Promise(r=>setTimeout(r,50));
    ld(false);
    draw(sym);
  }catch(e){ld(false);st('er','ERROR');}
}

function draw(sym){
  const d=C[sym];if(!d)return;
  const ib=sym==='btc';
  // Formating spot with space and comma as per screenshot
  const spotRaw=d.spot.toFixed(2);
  const parts = spotRaw.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, " ");
  const sfsp='$'+parts.join(',');

  const CS=[
    [0.0, '#10174F'],
    [0.2, '#354AA8'],
    [0.4, '#7F93E4'],
    [0.5, '#E5E6E8'],
    [0.6, '#F8CE5D'],
    [0.8, '#D85412'],
    [1.0, '#980C00']
  ];

  const xs=d.pts.map(p=>p.K),ys=d.pts.map(p=>p.dte),zs=d.pts.map(p=>p.iv);
  const kMn=Math.min(...xs),kMx=Math.max(...xs);
  const dMn=Math.min(...ys),dMx=Math.max(...ys);
  const nK=36,nD=24;
  const kG=Array.from({length:nK},(_,i)=>kMn+i*(kMx-kMn)/(nK-1));
  const dG=Array.from({length:nD},(_,i)=>{
    const t=i/(nD-1);
    return Math.round(dMn+(dMx-dMn)*Math.pow(t,0.55));
  }).filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a-b);

  const bwK=(kMx-kMn)/10;
  const zG=dG.map(td=>{
    const bwD=Math.max(4,td*0.22);
    return kG.map(tk=>{
      let sw=0,sz=0;
      d.pts.forEach(p=>{
        const dk=(p.K-tk)/bwK,dd=(p.dte-td)/bwD;
        const w=Math.exp(-0.5*(dk*dk+dd*dd));
        if(w>5e-4){sw+=w;sz+=w*p.iv;}
      });
      return sw>0.02?sz/sw:null;
    });
  });

  const plotEl=document.getElementById('plot');
  Plotly.react(plotEl,[
    {
      type:'surface',x:kG,y:dG,z:zG,colorscale:CS,opacity:0.95,showscale:true,
      colorbar:{title:{text:'IV %',font:{color:'#ccc',size:12},side:'right'},
        tickfont:{color:'#ccc',size:11},ticksuffix:'%',
        thickness:12,len:0.65,x:1.01,bgcolor:'rgba(0,0,0,0)',outlinecolor:'#222',outlinewidth:0},
      hovertemplate:'Strike: $%{x:,.0f}<br>DTE: %{y} days<br>IV: %{z:.1f}%<extra></extra>',
      lighting:{ambient:.75,diffuse:.62,specular:.25,roughness:.5,fresnel:.15},
      lightposition:{x:-500,y:-2000,z:4000},
    },
    {
      type:'scatter3d',
      x:xs,y:ys,z:zs,mode:'markers',
      marker:{size:1.6,color:zs,colorscale:CS,cmin:Math.min(...zs),cmax:Math.max(...zs),opacity:0.35,showscale:false},
      hovertemplate:'Strike: $%{x:,.0f}<br>DTE: %{y} days<br>IV: %{z:.1f}%<extra></extra>',
      showlegend:false,
    }
  ],{
    paper_bgcolor:'#101114',plot_bgcolor:'#101114',
    margin:{l:0,r:100,t:40,b:20},
    scene:{
      bgcolor:'#101114',
      camera:{eye:{x:1.6,y:1.3,z:0.55},center:{x:0,y:0,z:-0.15},up:{x:0,y:0,z:1}},
      aspectmode:'manual',aspectratio:{x:1.4,y:1.2,z:0.85},
      xaxis:{title:{text:'Strike ($)',font:{color:'#aaa',size:13}},tickfont:{color:'#999',size:11},
        gridcolor:'rgba(255,255,255,0.4)',linecolor:'rgba(255,255,255,0)',backgroundcolor:'#101114',showspikes:false},
      yaxis:{title:{text:'Days to Expiry',font:{color:'#aaa',size:13}},tickfont:{color:'#999',size:11},
        gridcolor:'rgba(255,255,255,0.4)',linecolor:'rgba(255,255,255,0)',backgroundcolor:'#101114',showspikes:false},
      zaxis:{title:{text:'IV (%)',font:{color:'#aaa',size:13}},tickfont:{color:'#999',size:11},ticksuffix:'%',
        gridcolor:'rgba(255,255,255,0.4)',linecolor:'rgba(255,255,255,0)',backgroundcolor:'#101114',showspikes:false},
    },
    font:{color:'#ccc',family:'Inter,Arial,sans-serif'},
    hoverlabel:{bgcolor:'#333333',bordercolor:'#ffffff',font:{color:'#ffffff',size:13,family:'Inter,-apple-system,sans-serif'}},
  },{responsive:true,displayModeBar:true,
    modeBarButtonsToRemove:['toImage','sendDataToCloud','toggleSpikelines'],displaylogo:false});

  document.getElementById('spotval').textContent=`${sfsp}`;
  st('ok',d.fb?'● SABR MODEL':'● LIVE');
  tick();
  setTimeout(()=>Plotly.Plots.resize(plotEl),300);
}

async function go(sym){
  if(CUR===sym)return;
  CUR=sym;
  document.getElementById('bb').className='ab'+(sym==='btc'?' btc':'');
  document.getElementById('be').className='ab'+(sym==='eth'?' eth':'');
  if(!C[sym])await load(sym); else draw(sym);
}

function ld(on,nm,col){
  document.getElementById('ld').style.display=on?'flex':'none';
  if(on){
    document.getElementById('ldsym').textContent=nm||'';
    document.getElementById('ldsym').style.color=col||'#333';
    document.getElementById('ldbar').style.background=col||'#4a9eff';
    document.getElementById('ldbar').style.width='6%';
  }
}
function ltxt(t,p){document.getElementById('ldtxt').textContent=t;document.getElementById('ldbar').style.width=p+'%';}
function st(cls,txt){const e=document.getElementById('st');e.textContent=txt;e.className=cls;}
function tick(){
  if(TM)clearInterval(TM);TR=1800; // 30 minutes limit for updates
  TM=setInterval(()=>{
    TR--;if(TR<=0){TR=1800;delete C[CUR];load(CUR);}
  },1000);
}

document.addEventListener('keydown',e=>{
  if(e.key.toLowerCase()==='b')go('btc');
  if(e.key.toLowerCase()==='e')go('eth');
});

load('btc');
</script>
</body>
</html>
